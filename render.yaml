services:
  - type: worker
    name: mindmate
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    plan: free
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: NEON_MINDMATE_DB_URL
        sync: false
      - key: RENDER_EXTERNAL_URL
        sync: false
